name: Test pip install git+

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  pip_git_install:
    name: pip git install on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14]
        python-version: ["3.10"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install from git URL
        run: |
          python -m pip install "vmtk-headless[test] @ git+file://${GITHUB_WORKSPACE}"

      - name: Run smoke test
        run: python tools/smoke_test_install.py

      - name: Run pytest install smoke tests
        run: python -m pytest -q tests/test_headless_install.py
