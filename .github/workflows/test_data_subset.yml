name: Test headless core data suite

on:
  workflow_dispatch:

jobs:
  headless_core_data_suite:
    name: pytest headless core data suite on ubuntu-22.04
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: |
          python -m pip install ".[test]"

      - name: Fetch upstream test data
        run: |
          git submodule update --init --depth 1 --checkout tests/vmtk-test-data

      - name: Run headless core pytest suite
        run: python tools/run_headless_core_tests.py
