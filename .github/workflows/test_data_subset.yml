name: Test headless data subset

on:
  workflow_dispatch:

jobs:
  headless_data_subset:
    name: pytest data subset on ubuntu-22.04
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install from git URL
        run: |
          python -m pip install "vmtk-headless[test] @ git+file://${GITHUB_WORKSPACE}"

      - name: Fetch upstream test data
        run: |
          git submodule update --init --depth 1 --checkout tests/vmtk-test-data

      - name: Run headless pytest data subset
        run: |
          python -m pytest -q \
            tests/test_vmtkScripts/test_vmtksurfacemassproperties.py \
            tests/test_vmtkScripts/test_vmtkimageshiftscale.py \
            tests/test_vmtkScripts/test_vmtksurfaceappend.py \
            tests/test_vmtkScripts/test_vmtksurfacereader.py \
            tests/test_vmtkScripts/test_vmtkcenterlinegeometry.py \
            tests/test_vmtkScripts/test_vmtkcenterlinesmoothing.py \
            tests/test_vmtkScripts/test_vmtkcenterlineresampling.py \
            tests/test_vmtkScripts/test_vmtkbranchgeometry.py \
            tests/test_vmtkScripts/test_vmtkbifurcationvectors.py
